name: 'setup-java'
description: 'Delegate to actions/setup-java'

inputs:
  java-version:
    type: string
    required: true
  distribution:
    type: string
    required: false
    default: 'temurin'

runs:
  using: 'composite'
  steps:
    - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: ${{ inputs.java-version }}
        distribution: ${{ inputs.distribution }}
