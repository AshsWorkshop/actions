name: 'setup-node'
description: 'Delegate to actions/setup-node'

inputs:
  node-version-file:
    type: string
    required: true

runs:
  using: 'composite'
  steps:
    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version-file: ${{ inputs.node-version-file }}
        cache: npm
